<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Raum Programm</title>
<style>
  body {
    font-family: Arial, sans-serif;
    text-align: center;
    margin: 50px;
  }
  h2 {
    color: #333;
  }
  embed {
    border: 1px solid #ccc;
  }
</style>
</head>
<body>
<h2>Programm wird geladen...</h2>

<script>
// Funktion prüft events.json und zeigt das richtige PDF
async function checkEvent() {
  try {
    const response = await fetch('events.json');
    const events = await response.json();
    const now = new Date();

    let found = false;

    for (let event of events) {
      const start = new Date(event.start);
      const end = new Date(event.end);

      if (now >= start && now <= end) {
        // PDF eingebettet anzeigen
        document.body.innerHTML = '<h2>Aktuelles Programm</h2><embed src="' + event.file + '" width="80%" height="800px" type="application/pdf">';
        found = true;
        break;
      }
    }

    if (!found) {
      document.body.innerHTML = "<h2>Heute findet keine Veranstaltung statt.</h2>";
    }
  } catch (error) {
    document.body.innerHTML = "<h2>Fehler beim Laden der Veranstaltungen.</h2>";
    console.error(error);
  }
}

// Aufruf der Funktion
checkEvent();
</script>

</body>
</html>
