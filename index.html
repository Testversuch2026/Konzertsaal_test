<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raum Programm</title>

<style>
  body {
    font-family: Arial, sans-serif;
    text-align: center;
    margin: 40px 20px;
  }

  h2 {
    color: #333;
  }

  .button {
    display: inline-block;
    padding: 12px 20px;
    margin-top: 20px;
    background-color: #007BFF;
    color: white;
    text-decoration: none;
    border-radius: 6px;
    font-size: 18px;
  }

  .button:hover {
    background-color: #0056b3;
  }
</style>
</head>

<body>
<h2>Programm wird geladen...</h2>

<script>
async function checkEvent() {
  try {
    // Lade die JSON-Datei
    const response = await fetch('./events.json');
    if (!response.ok) throw new Error("HTTP Fehler: " + response.status);

    const events = await response.json();
    const now = new Date();

    console.log("Jetzt:", now); // Debug

    let found = false;

    for (let event of events) {
      // Zeitzone in JSON berücksichtigen (+01:00 für MEZ)
      const start = new Date(event.start);
      const end = new Date(event.end);

      console.log("Prüfe Event:", event.file, "von", start, "bis", end);

      // Millisekunden-Vergleich für Stabilität
      if (now.getTime() >= start.getTime() && now.getTime() <= end.getTime()) {
        found = true;

        // Anzeige-Button für PDF (funktioniert auf Desktop & Handy)
        document.body.innerHTML = `
          <h2>Aktuelles Programm</h2>
          <p>PDF für die aktuelle Veranstaltung:</p>
          <a class="button" href="${event.file}" target="_blank">📄 PDF öffnen</a>
        `;
        break;
      }
    }

    if (!found) {
      document.body.innerHTML = "<h2>Heute findet keine Veranstaltung statt.</h2>";
    }

  } catch (error) {
    document.body.innerHTML =
      "<h2>Fehler beim Laden der Veranstaltungen.</h2><p>" + error.message + "</p>";
    console.error(error);
  }
}

// Aufruf der Funktion
checkEvent();
</script>

</body>
</html>
